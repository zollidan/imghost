version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: imghost-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

    # networks:
    #   - network1

volumes:
  postgres_data:
